<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portus</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-shell">
  <main class="popup-app">
    <header class="popup-header">
      <div class="drawer-title-switch popup-view-switch" role="tablist" aria-label="Popup views">
        <button class="drawer-title-btn is-active" id="popupShortcutsTab" type="button" role="tab" aria-selected="true" aria-controls="popupShortcutsPanel" data-action="switch-popup-view" data-view="shortcuts" data-i18n="shortcutsLabel">快捷方式</button>
        <button class="drawer-title-btn" id="popupTabsTab" type="button" role="tab" aria-selected="false" aria-controls="popupTabsPanel" data-action="switch-popup-view" data-view="tabs" data-i18n="openTabsSectionTitle">打开的标签页</button>
      </div>
      <button class="popup-refresh-btn" type="button" data-action="refresh-popup" data-i18n-aria-label="popupRefreshLabel" aria-label="Refresh popup content">
        <svg class="btn-svg" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-refresh-ccw-icon lucide-refresh-ccw"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
      </button>
    </header>

    <section class="popup-panel is-active" id="popupShortcutsPanel" role="tabpanel" aria-labelledby="popupShortcutsTab">
      <div class="quick-tabs popup-shortcuts-grid" id="popupShortcutsList"></div>
      <div class="popup-empty" id="popupShortcutsEmpty" data-i18n="popupShortcutsEmpty" hidden>还没有快捷方式。</div>
    </section>

    <section class="popup-panel" id="popupTabsPanel" role="tabpanel" aria-labelledby="popupTabsTab" hidden>
      <div class="popup-group-nav group-nav popup-group-nav-wrap" id="popupGroupNav"></div>
      <div class="popup-tabs-list" id="popupTabsList"></div>
      <div class="popup-empty" id="popupTabsEmpty" data-i18n="popupTabsEmpty" hidden>没有可显示的网页标签页。</div>
    </section>
  </main>

  <script src="../config.js"></script>
  <script src="../config-loader.js"></script>
  <script src="../icon-utils.js"></script>
  <script src="../list-order.js"></script>
  <script src="../background-image.js"></script>
  <script src="../i18n.js"></script>
  <script src="../theme-controls.js"></script>
  <script src="../session-groups.js"></script>
  <script src="../group-order.js"></script>
  <script src="popup.js"></script>

</body>
</html>
